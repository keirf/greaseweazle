# prefix: rm.
# RM (Research Machines) 8-bit (RM 380Z/RML 480Z) disk definitions.

# RM 8" -380Z DS/SD floppy disk format. 77 tracks, 2 heads, FM encoding.
disk 8in.sd
    cyls = 77
    heads = 2
    tracks 0-76.0 ibm.fm
        bps = 128
        secs = 26
        id = 1
        h = 0
    end
    tracks 0-76.1 ibm.fm
        bps = 128
        secs = 26
        id = 1  
        h = 0
    end
end

# RM 5.25" - 380Z DS/SD floppy disk format. 40 tracks, 2 heads, FM encoding.
disk 5in.sd
    cyls = 40
    heads = 2
    tracks 0-39.0 ibm.fm
        bps = 128
        secs = 16
        id = 1
        h = 0
    end
    tracks 0-39.1 ibm.fm
        bps = 128
        secs = 16
        id = 1
        h = 0
    end
    end

    # RM 5.25" - 480Z DS/DD floppy disk format. 40 tracks, 2 heads, MFM encoding. Track 0 is SD (FM). Often called "DD"
    disk 5in.dd
    cyls = 40
    heads = 2
    tracks 0.0 ibm.fm
        bps = 128
        secs = 16
        id = 1
        h = 0
    end
    tracks 0.1 ibm.fm
        bps = 128
        secs = 16
        interleave = 4
        id = 1  
        h = 0
    end
    tracks 1-39.0 ibm.mfm
        bps = 512
        secs = 9
        id = 1
        h = 0
    end
    tracks 1-39.1 ibm.mfm
        bps = 512
        secs = 9
        id = 1  
        h = 0
    end
end

# RM 5.25" - 480Z DS/DD floppy disk format. 80 tracks, 2 heads, MFM encoding. Track 0 is SD (FM). Often called "QD"
disk 5in.qd
  cyls = 80
  heads = 2
    tracks 0.0 ibm.fm
        bps = 128
        secs = 16
        id = 1
        h = 0
    end
    tracks 0.1 ibm.fm
        bps = 128
        secs = 16
        id = 1 
        h = 0
    end
    tracks 1-79.0 ibm.mfm
        bps = 512
        secs = 9
        id = 1
        h = 0
    end
    tracks 1-79.1 ibm.mfm
        bps = 512
        secs = 9
        id = 1 
        h = 0
    end
end